<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>くりさがり ひきざん ドリル</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Yu Gothic", "BIZ UDGothic", sans-serif;
    background: linear-gradient(160deg, #fdf6e3 0%, #ffeedd 100%);
    color: #3b3b3b;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none;
    min-height: 100%;
  }
  .app { width: 100%; max-width: 760px; padding: 12px 16px 24px; display: flex; flex-direction: column; align-items: center; }

  /* ===== ヘッダー ===== */
  header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 4px 2px 10px; }
  header h1 { font-size: 1.25rem; color: #e07b39; }
  .progress { font-size: 1.1rem; font-weight: bold; color: #666; }
  .stars { font-size: 1.1rem; letter-spacing: 1px; }

  /* ===== モード選択 ===== */
  .screen { width: 100%; display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }
  .menu-title { font-size: 1.6rem; margin: 28px 0 8px; color: #e07b39; text-align: center; }
  .menu-sub { font-size: 1rem; color: #888; margin-bottom: 28px; text-align: center; }
  .mode-btn {
    width: 100%; max-width: 460px; margin: 10px 0; padding: 22px 18px;
    font-size: 1.35rem; font-weight: bold; font-family: inherit;
    border: none; border-radius: 20px; cursor: pointer;
    color: #fff; box-shadow: 0 5px 0 rgba(0,0,0,0.18);
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .mode-btn .desc { display: block; font-size: 0.9rem; font-weight: normal; margin-top: 6px; opacity: 0.92; }
  .mode-btn.hissan { background: #4a9e5c; }
  .mode-btn.quick { background: #4a7fd4; }

  /* ===== 筆算エリア ===== */
  .hissan-board {
    background: #fff; border-radius: 24px; padding: 20px 30px 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    margin-bottom: 10px;
    position: relative;
  }
  .hissan-grid {
    display: grid;
    grid-template-columns: 64px 84px 84px;
    grid-auto-rows: auto;
    justify-items: center; align-items: end;
    font-size: 3.4rem; font-weight: bold;
    font-variant-numeric: tabular-nums;
  }
  .borrow-row { height: 44px; font-size: 1.7rem; color: #d9534f; align-items: center; }
  .cell { position: relative; line-height: 1.15; min-height: 1.15em; }
  .digit-slash::after {
    content: ""; position: absolute; left: 10%; right: 10%; top: 50%;
    border-top: 5px solid #d9534f; transform: rotate(-25deg);
  }
  .digit-faded { color: #bbb; }
  .op { font-size: 2.6rem; color: #555; align-self: end; padding-bottom: 6px; }
  .hr-line { grid-column: 1 / 4; width: 100%; border-top: 4px solid #444; margin: 8px 0 10px; }
  .ans-cell {
    width: 76px; height: 84px; border-radius: 14px;
    border: 3px dashed #c9c9c9; background: #fafafa;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.2rem;
  }
  .ans-cell.current { border-color: #4a7fd4; border-style: solid; background: #eef4ff; animation: pulse 1.2s infinite; }
  .ans-cell.done { border-color: #4a9e5c; border-style: solid; background: #f0fff2; color: #2c7a3d; }
  .ans-cell.empty-slot { border: none; background: transparent; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(74,127,212,0.45); } 50% { box-shadow: 0 0 0 8px rgba(74,127,212,0); } }

  /* くりさげボタン(十の位タップ) */
  .borrow-target {
    border-radius: 12px; cursor: pointer; padding: 0 6px;
  }
  .borrow-target.hint { background: #fff3cd; outline: 4px solid #ffb84d; animation: pulse-o 1.2s infinite; }
  @keyframes pulse-o { 0%,100% { outline-color: #ffb84d; } 50% { outline-color: #ffdd99; } }
  .borrow-note { font-size: 1.7rem; color: #d9534f; font-weight: bold; }
  .ten-note { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); font-size: 1.3rem; color: #d9534f; white-space: nowrap; }
  .borrow-one { font-size: 0.55em; color: #d9534f; margin-right: 2px; vertical-align: 8%; }
  .col-hl { background: #fff3cd; border-radius: 12px; box-shadow: 0 0 0 6px #fff3cd; }
  .ans-cell.col-hl { box-shadow: none; }

  /* ===== ガイド ===== */
  .guide {
    width: 100%; max-width: 560px; min-height: 64px;
    background: #fff; border-radius: 16px; padding: 12px 18px;
    font-size: 1.15rem; line-height: 1.5; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 12px; color: #444;
    display: flex; align-items: center; justify-content: center;
  }
  .guide.ok { background: #e8f8ec; color: #2c7a3d; font-weight: bold; }
  .guide.ng { background: #fdecea; color: #c0392b; font-weight: bold; }

  /* ===== クイックモード ===== */
  .quick-problem {
    background: #fff; border-radius: 24px; padding: 26px 34px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    font-size: 3.4rem; font-weight: bold; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px;
    font-variant-numeric: tabular-nums;
  }
  .quick-answer {
    min-width: 130px; height: 84px; border-radius: 14px;
    border: 3px solid #4a7fd4; background: #eef4ff;
    display: flex; align-items: center; justify-content: center;
    padding: 0 12px; font-size: 3.2rem;
  }

  /* ===== テンキー ===== */
  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    width: 100%; max-width: 460px; margin-top: 4px;
  }
  .key {
    height: 74px; font-size: 2.2rem; font-weight: bold; font-family: inherit;
    border: none; border-radius: 18px; background: #fff; color: #333;
    box-shadow: 0 4px 0 #d8d0c4; cursor: pointer;
  }
  .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #d8d0c4; }
  .key.func { font-size: 1.25rem; }
  .key.del { background: #f8d7da; color: #a33; box-shadow: 0 4px 0 #dcb2b6; }
  .key.enter { background: #4a9e5c; color: #fff; box-shadow: 0 4px 0 #357443; }
  .key:disabled { opacity: 0.4; }

  .toolbar { display: flex; gap: 12px; margin-top: 16px; }
  .tool-btn {
    padding: 10px 20px; font-size: 1rem; font-family: inherit; font-weight: bold;
    border: none; border-radius: 12px; background: #eee; color: #666; cursor: pointer;
    box-shadow: 0 3px 0 #ccc;
  }
  .tool-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ccc; }

  /* ===== 結果画面 ===== */
  .result-card {
    background: #fff; border-radius: 24px; padding: 36px 40px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.10); text-align: center; margin-top: 36px;
  }
  .result-card h2 { font-size: 1.8rem; color: #e07b39; margin-bottom: 14px; }
  .result-score { font-size: 3rem; font-weight: bold; color: #4a9e5c; margin: 10px 0 4px; }
  .result-msg { font-size: 1.2rem; color: #666; margin-bottom: 18px; }
  .review-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px;
    margin: 0 auto 24px; text-align: left; max-width: 480px;
  }
  .review-item {
    font-size: 1.25rem; font-weight: bold; font-variant-numeric: tabular-nums;
    background: #f7f7f2; border-radius: 10px; padding: 8px 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    white-space: nowrap;
  }
  .review-item .mark { font-size: 1.1rem; }
  .review-item.ng { background: #fdecea; }
  .review-item.ng .expr { color: #c0392b; }
  @media (max-width: 560px) { .review-list { grid-template-columns: 1fr; } }

  .big-maru {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    pointer-events: none; z-index: 50;
  }
  .big-maru.show { display: flex; }
  .big-maru span { font-size: 9rem; animation: pop 0.5s ease; }
  @keyframes pop { 0% { transform: scale(0.2); opacity: 0; } 60% { transform: scale(1.25); } 100% { transform: scale(1); opacity: 1; } }

  @media (max-height: 740px) {
    .hissan-grid { font-size: 2.6rem; grid-template-columns: 52px 70px 70px; }
    .ans-cell { width: 64px; height: 68px; font-size: 2.5rem; }
    .key { height: 60px; }
    .borrow-row { height: 36px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🐿️ くりさがり ひきざん</h1>
    <div class="progress" id="progress"></div>
    <div class="stars" id="stars"></div>
  </header>

  <!-- メニュー -->
  <div class="screen active" id="screen-menu">
    <div class="menu-title">くりさがりの ひきざんを<br>れんしゅうしよう!</div>
    <div class="menu-sub">やりかたを えらんでね(ぜんぶで 10もん)</div>
    <button class="mode-btn hissan" data-mode="hissan">✏️ ひっさんモード
      <span class="desc">くりさがりの じゅんばんどおりに ひっさんで とくよ</span>
    </button>
    <button class="mode-btn quick" data-mode="quick">⚡ こたえだけモード
      <span class="desc">あたまの なかで けいさんして こたえを いれるよ</span>
    </button>
  </div>

  <!-- 筆算モード -->
  <div class="screen" id="screen-hissan">
    <div class="hissan-board">
      <div class="hissan-grid" id="hissan-grid"></div>
    </div>
    <div class="guide" id="guide-hissan"></div>
    <div class="keypad" id="keypad-hissan"></div>
    <div class="toolbar"><button class="tool-btn" id="quit-hissan">← やめる</button></div>
  </div>

  <!-- クイックモード -->
  <div class="screen" id="screen-quick">
    <div class="quick-problem">
      <span id="q-a"></span><span>−</span><span id="q-b"></span><span>=</span>
      <span class="quick-answer" id="q-ans">&nbsp;</span>
    </div>
    <div class="guide" id="guide-quick"></div>
    <div class="keypad" id="keypad-quick"></div>
    <div class="toolbar"><button class="tool-btn" id="quit-quick">← やめる</button></div>
  </div>

  <!-- 結果 -->
  <div class="screen" id="screen-result">
    <div class="result-card">
      <h2 id="result-title">おつかれさま!</h2>
      <div class="result-score" id="result-score"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="review-list" id="review-list"></div>
      <button class="mode-btn hissan" id="retry-btn">もういちど やる</button>
      <button class="mode-btn quick" id="menu-btn">メニューに もどる</button>
    </div>
  </div>
</div>

<div class="big-maru" id="big-maru"><span id="big-maru-char">⭕</span></div>

<script>
(() => {
  const TOTAL = 10;
  let mode = null;          // 'hissan' | 'quick'
  let qIndex = 0;
  let correctFirstTry = 0;
  let firstTry = true;
  let prob = null;          // {a, b, ans}
  let locked = false;
  let history = [];         // {a, b, ans, ok} 1問ごとの記録

  // ---- 問題生成:必ず一の位で繰り下がりが起きる2桁の引き算 ----
  function makeProblem() {
    while (true) {
      const a = 20 + Math.floor(Math.random() * 80);          // 20-99
      const bTens = Math.floor(Math.random() * Math.floor(a / 10)); // 0 〜 aの十の位-1
      const aOnes = a % 10;
      // 一の位:必ず a の一の位より大きくして繰り下がりを発生させる
      const bOnes = aOnes + 1 + Math.floor(Math.random() * (9 - aOnes));
      if (aOnes >= 9) continue;                               // 繰り下がり不可能なら作り直し
      const b = bTens * 10 + bOnes;
      if (b < 1 || a - b < 1) continue;
      return { a, b, ans: a - b };
    }
  }

  // ---- 共通UI ----
  const $ = id => document.getElementById(id);
  function show(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(screen).classList.add('active');
  }
  function updateHeader() {
    $('progress').textContent = mode ? `${qIndex + 1} / ${TOTAL} もん` : '';
    $('stars').textContent = '⭐'.repeat(correctFirstTry);
  }
  function flashMaru(ok) {
    const el = $('big-maru');
    $('big-maru-char').textContent = ok ? '⭕' : '❌';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ok ? 700 : 600);
  }
  function buildKeypad(container, onKey) {
    container.innerHTML = '';
    const keys = ['7','8','9','4','5','6','1','2','3','けす','0','OK'];
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.textContent = k;
      btn.className = 'key' + (k === 'けす' ? ' func del' : k === 'OK' ? ' enter' : '');
      btn.addEventListener('pointerdown', e => { e.preventDefault(); if (!locked) onKey(k); });
      container.appendChild(btn);
    });
  }

  function startMode(m) {
    mode = m;
    qIndex = 0;
    correctFirstTry = 0;
    history = [];
    show(m === 'hissan' ? 'screen-hissan' : 'screen-quick');
    nextProblem();
  }
  function nextProblem() {
    prob = makeProblem();
    firstTry = true;
    locked = false;
    updateHeader();
    if (mode === 'hissan') renderHissan();
    else renderQuick();
  }
  function markResult(ok) {
    if (ok && firstTry) correctFirstTry++;
    updateHeader();
  }
  function finishQuestion() {
    locked = true;
    history.push({ a: prob.a, b: prob.b, ans: prob.ans, ok: firstTry });
    setTimeout(() => {
      qIndex++;
      if (qIndex >= TOTAL) showResult();
      else nextProblem();
    }, 1100);
  }
  function showResult() {
    show('screen-result');
    $('progress').textContent = '';
    $('result-score').textContent = `⭐ ${correctFirstTry} / ${TOTAL}`;
    const msgs = correctFirstTry === TOTAL ? ['パーフェクト!すごい!🎉', 'てんさい!']
      : correctFirstTry >= 7 ? ['よくできました!💮', 'そのちょうし!']
      : correctFirstTry >= 4 ? ['がんばったね!👍', 'もうすこしで マスターだよ']
      : ['れんしゅう すれば できるようになるよ!💪', 'もういちど やってみよう'];
    $('result-title').textContent = msgs[0];
    $('result-msg').textContent = msgs[1];
    // 解いた問題の振り返り(まちがえた問題は赤く表示)
    $('review-list').innerHTML = history.map(h => `
      <div class="review-item${h.ok ? '' : ' ng'}">
        <span class="expr">${h.a} − ${h.b} = ${h.ans}</span>
        <span class="mark">${h.ok ? '⭕' : '❌'}</span>
      </div>`).join('');
  }

  // =====================================================================
  // 筆算モード
  //   学習指導要領(小2)の手順:
  //   ステップ1: 一の位が引けない → 十の位から1繰り下げる(十の位をタップ)
  //             → 十の位に斜線、上に1減らした数を書く
  //   ステップ2: 一の位を「10いくつ − ○」で計算して書く
  //   ステップ3: 十の位(繰り下げたあとの数)を計算して書く
  // =====================================================================
  let hStep = 0; // 0:くりさげ待ち 1:一の位入力 2:十の位入力

  function guideH(text, cls) {
    const g = $('guide-hissan');
    g.textContent = text;
    g.className = 'guide' + (cls ? ' ' + cls : '');
  }

  function renderHissan() {
    hStep = 0;
    const g = $('hissan-grid');
    const at = Math.floor(prob.a / 10), ao = prob.a % 10;
    const bt = Math.floor(prob.b / 10), bo = prob.b % 10;
    const ansT = Math.floor(prob.ans / 10), ansO = prob.ans % 10;
    const needTensCell = ansT > 0;

    g.innerHTML = `
      <div class="cell borrow-row"></div>
      <div class="cell borrow-row borrow-note" id="h-borrow"></div>
      <div class="cell borrow-row" id="h-ten-note"></div>
      <div class="cell"></div>
      <div class="cell borrow-target hint" id="h-at">${at}</div>
      <div class="cell" id="h-ao">${ao}</div>
      <div class="cell op">−</div>
      <div class="cell" id="h-bt">${bt > 0 ? bt : ''}</div>
      <div class="cell" id="h-bo">${bo}</div>
      <div class="hr-line"></div>
      <div class="cell"></div>
      <div class="${needTensCell ? 'ans-cell' : 'ans-cell empty-slot'}" id="h-ans-t"></div>
      <div class="ans-cell" id="h-ans-o"></div>
    `;
    $('h-at').addEventListener('pointerdown', e => { e.preventDefault(); onBorrowTap(); });
    guideH(`一のくらいは ${ao} − ${bo}。${ao} から ${bo} は ひけないね。ひかる 十のくらいの「${at}」を タッチして、1 くりさげよう!`);
  }

  function onBorrowTap() {
    if (locked || hStep !== 0) return;
    const at = Math.floor(prob.a / 10), ao = prob.a % 10, bo = prob.b % 10;
    const atEl = $('h-at');
    atEl.classList.remove('hint');
    atEl.classList.add('digit-slash', 'digit-faded');
    $('h-borrow').textContent = at - 1;                // 繰り下げ後の十の位を上に書く
    // 一の位を「1○」に書きかえて、10いくつになったことを見せる
    $('h-ao').innerHTML = `<span class="borrow-one">1</span>${ao}`;
    hStep = 1;
    $('h-ans-o').classList.add('current');
    // いま計算している一の位の列をハイライト
    ['h-ao', 'h-bo', 'h-ans-o'].forEach(id => $(id).classList.add('col-hl'));
    guideH(`くりさげたから、一のくらいは 10 と ${ao} で「${10 + ao} − ${bo}」。こたえを おしてね!`);
  }

  function onKeyHissan(k) {
    if (hStep === 0) {
      guideH(`さきに 十のくらいの かずを タッチして、くりさげよう!`);
      return;
    }
    if (k === 'けす' || k === 'OK') return; // 筆算モードは1桁ずつなのでそのまま判定

    const d = parseInt(k, 10);
    const at = Math.floor(prob.a / 10), ao = prob.a % 10;
    const bt = Math.floor(prob.b / 10), bo = prob.b % 10;
    const ansT = Math.floor(prob.ans / 10), ansO = prob.ans % 10;

    if (hStep === 1) {
      if (d === ansO) {
        const c = $('h-ans-o');
        c.textContent = d; c.classList.remove('current'); c.classList.add('done');
        ['h-ao', 'h-bo', 'h-ans-o'].forEach(id => $(id).classList.remove('col-hl'));
        if (ansT > 0) {
          hStep = 2;
          $('h-ans-t').classList.add('current');
          // 十の位の列にハイライトを移す
          ['h-borrow', 'h-bt', 'h-ans-t'].forEach(id => $(id).classList.add('col-hl'));
          guideH(`せいかい!つぎは 十のくらい。くりさげたから「${at - 1} − ${bt}」だよ。`, 'ok');
        } else {
          guideH(`せいかい!十のくらいは ${at - 1} − ${bt} = 0 だから、なにも かかないよ。こたえは ${prob.ans}!`, 'ok');
          flashMaru(true); markResult(true); finishQuestion();
        }
      } else {
        firstTry = false;
        flashMaru(false);
        guideH(`おしい!${10 + ao} − ${bo} を もういちど かんがえてみよう。`, 'ng');
      }
    } else if (hStep === 2) {
      if (d === ansT) {
        const c = $('h-ans-t');
        c.textContent = d; c.classList.remove('current'); c.classList.add('done');
        guideH(`せいかい!こたえは ${prob.ans} だね!🎉`, 'ok');
        flashMaru(true); markResult(true); finishQuestion();
      } else {
        firstTry = false;
        flashMaru(false);
        guideH(`おしい!十のくらいは くりさげて ${at - 1} に なってるよ。「${at - 1} − ${bt}」を かんがえよう。`, 'ng');
      }
    }
  }

  // =====================================================================
  // こたえだけモード
  // =====================================================================
  let quickInput = '';

  function renderQuick() {
    quickInput = '';
    $('q-a').textContent = prob.a;
    $('q-b').textContent = prob.b;
    $('q-ans').innerHTML = '&nbsp;';
    const g = $('guide-quick');
    g.textContent = 'こたえを おして、OK を おしてね!';
    g.className = 'guide';
  }

  function onKeyQuick(k) {
    const g = $('guide-quick');
    if (k === 'けす') {
      quickInput = quickInput.slice(0, -1);
    } else if (k === 'OK') {
      if (quickInput === '') return;
      if (parseInt(quickInput, 10) === prob.ans) {
        g.textContent = `せいかい!${prob.a} − ${prob.b} = ${prob.ans} 🎉`;
        g.className = 'guide ok';
        flashMaru(true); markResult(true); finishQuestion();
      } else {
        firstTry = false;
        flashMaru(false);
        g.textContent = 'おしい!もういちど かんがえてみよう。';
        g.className = 'guide ng';
        quickInput = '';
      }
    } else {
      if (quickInput.length < 2) quickInput += k;
    }
    $('q-ans').textContent = quickInput || ' ';
  }

  // ---- 配線 ----
  buildKeypad($('keypad-hissan'), onKeyHissan);
  buildKeypad($('keypad-quick'), onKeyQuick);
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b =>
    b.addEventListener('click', () => startMode(b.dataset.mode)));
  $('quit-hissan').addEventListener('click', () => { mode = null; updateHeader(); show('screen-menu'); });
  $('quit-quick').addEventListener('click', () => { mode = null; updateHeader(); show('screen-menu'); });
  $('retry-btn').addEventListener('click', () => startMode(mode));
  $('menu-btn').addEventListener('click', () => { mode = null; updateHeader(); show('screen-menu'); });
  updateHeader();
})();
</script>
</body>
</html>
